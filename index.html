<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Translation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- <h1>Text Translation Playground</h1> -->

  <!-- <h2>Result</h2> -->
  <h1 id="page-title">Translator</h1>
  <div id="all-content">
    <form id="translation-panel">
        <div id="panel-compress-cont">
          <button type="button" id="compress-carat" aria-expanded="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9.42464 0.33089C9.52952 0.435406 9.61273 0.559597 9.66951 0.696342C9.72629 0.833088 9.75552 0.979699 9.75552 1.12776C9.75552 1.27583 9.72629 1.42244 9.66951 1.55918C9.61273 1.69593 9.52952 1.82012 9.42464 1.92464L2.72245 8.62683L9.42464 15.3309C9.63598 15.5422 9.75471 15.8289 9.75471 16.1278C9.75471 16.4266 9.63598 16.7133 9.42464 16.9246C9.21329 17.136 8.92665 17.2547 8.62776 17.2547C8.32888 17.2547 8.04223 17.136 7.83089 16.9246L0.330886 9.42464C0.226006 9.32012 0.14279 9.19593 0.0860091 9.05919C0.0292281 8.92244 -3.70624e-07 8.77583 -3.77096e-07 8.62776C-3.83568e-07 8.4797 0.0292281 8.33309 0.0860091 8.19634C0.14279 8.0596 0.226006 7.93541 0.330886 7.83089L7.83089 0.33089C7.9354 0.22601 8.0596 0.142793 8.19634 0.0860119C8.33309 0.0292309 8.4797 1.00062e-06 8.62776 9.9415e-07C8.77583 9.87678e-07 8.92244 0.0292309 9.05918 0.0860119C9.19593 0.142793 9.32012 0.22601 9.42464 0.33089Z" fill="#282828"/>
            </svg>
          </button>
        </div>
        <div id="translation-body">
          <div id="mode-switch-area">
            <h2>Translation Mode</h2>
            <div id="mode-switch-cont">
              <button type="button" class="toggle-button" toggle-mode="text" aria-pressed="true">Text mode</button>
              <button type="button" class="toggle-button" toggle-mode="visual">Image mode</button>
            </div>
          </div>

          <div class="toggle-type-controls" id="text-controls" aria-visible="true">
            
            <div class="image-drop-cont">
              <!-- <label for="source">Source text</label><br /> -->
              <h2>Input Source Text</h2>
              <div id="source-wrap" class="drop-area">
                <textarea id="source" placeholder="Add any text here..."></textarea>
              </div>
              <div class="generate-btn-cont">
                <button type="button" class="generate-text-btn" id="generate-sentences-btn" text-type="sentences">Generate sentences</button>
                <button type="button" class="generate-text-btn" id="generate-pangram-btn" text-type="pangram">Generate pangram</button>
              </div>
            </div>

            <!-- <label for="mode">Translate into</label><br /> -->
            <div id="button-area">
              <h2>Translate Into</h2>
              <div id="mode-buttons" aria-label="Translation mode">
                <button type="button" class="mode-btn" data-mode="visual">Mono dots</button>
                <button type="button" class="mode-btn" data-mode="visualColor1">Color grid</button>
                <button type="button" class="mode-btn" data-mode="visualColor2">Square grid</button>
                <button type="button" class="mode-btn" data-mode="gridRadius">Punctuation grid</button>
                <button type="button" class="mode-btn" data-mode="concretePoem">Blackout poem</button>
                <!-- <button type="button" class="mode-btn" data-mode="visualColor3">Color line</button> -->
                <button type="button" class="mode-btn" data-mode="colorLine2">Syllables line</button>
                <button type="button" class="mode-btn" data-mode="colorLine3">Alphabet line</button>
                <!-- <button type="button" class="mode-btn" data-mode="neuron">Neuron random</button> -->
                <!-- <button type="button" class="mode-btn" data-mode="neuron2">Neuron color</button> -->
                <button type="button" class="mode-btn" data-mode="neuron3">Neuron grid</button>
                <button type="button" class="mode-btn" data-mode="neuron4">Neuron words</button>
                <button type="button" class="mode-btn" data-mode="binary">Binary</button>
                <button type="button" class="mode-btn" data-mode="french">French</button>
              </div>
            </div>
          </div>

          <div class="toggle-type-controls" id="image-controls" aria-visible="false">

            <div class="image-drop-cont">
              <h2>Input source image</h2>
              <div id="drop-cont" class="drop-area">
                <!-- <img id="image-icon" src="assets/image-icon.svg"/> -->
                <div id="drop-area">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 38 38" fill="none">
                    <path d="M6 0H32C33.5913 0 35.1174 0.632141 36.2426 1.75736C37.3679 2.88258 38 4.4087 38 6V32C38 33.5913 37.3679 35.1174 36.2426 36.2426C35.1174 37.3679 33.5913 38 32 38H6C4.4087 38 2.88258 37.3679 1.75736 36.2426C0.632141 35.1174 0 33.5913 0 32V6C0 4.4087 0.632141 2.88258 1.75736 1.75736C2.88258 0.632141 4.4087 0 6 0ZM6 2C4.93913 2 3.92172 2.42143 3.17157 3.17157C2.42143 3.92172 2 4.93913 2 6V29.18L10.58 20.58L15.58 25.58L25.58 15.58L36 26V6C36 4.93913 35.5786 3.92172 34.8284 3.17157C34.0783 2.42143 33.0609 2 32 2H6ZM15.58 28.42L10.58 23.42L2 32C2 33.0609 2.42143 34.0783 3.17157 34.8284C3.92172 35.5786 4.93913 36 6 36H32C33.0609 36 34.0783 35.5786 34.8284 34.8284C35.5786 34.0783 36 33.0609 36 32V28.82L25.58 18.42L15.58 28.42ZM11 6C12.3261 6 13.5979 6.52678 14.5355 7.46447C15.4732 8.40215 16 9.67392 16 11C16 12.3261 15.4732 13.5979 14.5355 14.5355C13.5979 15.4732 12.3261 16 11 16C9.67392 16 8.40215 15.4732 7.46447 14.5355C6.52678 13.5979 6 12.3261 6 11C6 9.67392 6.52678 8.40215 7.46447 7.46447C8.40215 6.52678 9.67392 6 11 6ZM11 8C10.2044 8 9.44129 8.31607 8.87868 8.87868C8.31607 9.44129 8 10.2044 8 11C8 11.7956 8.31607 12.5587 8.87868 13.1213C9.44129 13.6839 10.2044 14 11 14C11.7956 14 12.5587 13.6839 13.1213 13.1213C13.6839 12.5587 14 11.7956 14 11C14 10.2044 13.6839 9.44129 13.1213 8.87868C12.5587 8.31607 11.7956 8 11 8Z" fill="currentColor"/>
                  </svg>
                  <p id="instruction-text">Upload image here</p>
                  <input type="file" id="file-input" accept="image/*" >
                </div>
                <img id="preview-img" src="#" alt="image preview" style="display: none">
              </div>
              <div class="generate-btn-cont">
                <button type="button" id="generate-image-btn" text-type="image">Generate image</button>
              </div>
            </div>

            <div id="button-area">
              <h2>Translate Into</h2>
              <div id="mode-buttons" aria-label="Translation mode">
                <button type="button" class="mode-btn" data-mode="typeArt">Type art (brightness)</button>
                <button type="button" class="mode-btn" data-mode="typeArtColor">Type art (color)</button>
                <button type="button" class="mode-btn" data-mode="rgb">RGB grid</button>
                <button type="button" class="mode-btn" data-mode="description">Image description</button>
              </div>
            </div>
          </div>

          <button id="submit-button" type="submit">Translate</button>
        </div>
        <div id="download-canvas-btn-cont">
          <button type="button" id="download-canvas-btn">Download output</button>
        </div>

    </form>

    <div id="canvas-area">
      <!-- <pre id="result">—</pre> -->
      <div id="canvas-container"></div>
    </div>
  </div>

  <!-- p5.js library -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

  <!-- p5 mono visual renderer -->
  <script src="text.js"></script>

  <!-- p5 mono visual renderer -->
  <script src="visual.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="circleGrid.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="squareGrid.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="squareGridRadius.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="colorLine.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="colorLine2.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="colorLine3.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="neuron.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="neuron2.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="neuron3.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="neuron4.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="poem.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="imageTrans.js"></script>

  <!-- p5 visual color 1 renderer -->
  <script src="imageText.js"></script>

  <script src="rgbValue.js"></script>

  <!-- App logic using translation functions -->
   <script src="sketch.js"></script>
  <script type="module" src="image-function.js"></script>
</body>
</html>
